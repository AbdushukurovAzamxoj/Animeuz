<!DOCTYPE html>
<html lang="uz">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0D0D0D" />
  <title>AnimeUZ — O'zbek tilidagi anime</title>
  <meta name="description" content="O'zbek tiliga tarjima qilingan animalarni tomosha qiling" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>

<body>
  <div id="app">
    <!-- Debug Console (Faqat xato bo'lganda ko'rinadi) -->
    <div id="debug-console"
      style="position:fixed; top:0; left:0; right:0; max-height:150px; background:rgba(0,0,0,0.8); color:white; font-size:10px; font-family:monospace; padding:5px; z-index:9999; overflow-y:auto; pointer-events:none;">
    </div>

    <main id="page-content"></main>

    <nav id="bottom-nav">
      <button class="nav-btn active" data-tab="popular">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
        <span>Bosh sahifa</span>
      </button>
      <button class="nav-btn" data-tab="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        <span>Qidiruv</span>
      </button>
      <button class="nav-btn" data-tab="saved">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path
            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
        </svg>
        <span>Sevimlilar</span>
      </button>
      <button class="nav-btn" data-tab="profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
        <span>Profil</span>
      </button>
    </nav>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
