<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kirish | AnimeUZ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./src/style.css" />
  <link rel="stylesheet" href="./src/login.css" />
</head>
<body class="login-body">

  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <a href="index.html" class="logo">
          <span class="logo-symbol">ア</span>
          <span class="logo-name">Anime<span class="logo-uz">UZ</span></span>
        </a>
        <h2 id="formTitle">Xush kelibsiz!</h2>
        <p id="formDesc">Sevimli animelaringiz dunyosiga qaytish uchun tizimga kiring.</p>
      </div>

      <!-- STEP 1: Form (Kirish yoki Ro'yxatdan o'tish) -->
      <div id="stepForm">
        
        <div class="auth-tabs">
          <button type="button" class="auth-tab active" data-tab="register">Ro'yxatdan o'tish</button>
          <button type="button" class="auth-tab" data-tab="login">Kirish</button>
        </div>

        <form class="login-form" id="mainForm">
          <div class="input-group">
            <label for="email">Email manzilingiz</label>
            <div class="input-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
              <input type="email" id="email" placeholder="example@gmail.com" required />
            </div>
          </div>

          <div class="input-group">
            <label for="password" id="passwordLabel">Parol o'ylab toping</label>
            <div class="input-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
              <input type="password" id="password" placeholder="••••••••" required />
            </div>
          </div>

          <button type="submit" class="btn-submit" id="btnSubmitForm">
            Ro'yxatdan o'tish
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
          </button>
        </form>

        <div class="social-divider">
          <span>Yoki</span>
        </div>

        <div class="social-login">
          <button class="btn-social google">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Google orqali
          </button>
        </div>
      </div>

      <!-- STEP 2: Kodni kiritish -->
      <div id="stepCode" class="hidden">
        <div class="verify-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="1.5"><rect x="2" y="4" width="20" height="16" rx="3"/><polyline points="22,4 12,13 2,4"/></svg>
        </div>
        <p class="verify-email-text">Kod yuborildi: <strong id="sentEmail"></strong></p>

        <div class="otp-inputs" id="otpInputs">
          <input type="text" maxlength="1" class="otp-box" data-index="0" inputmode="numeric" autofocus />
          <input type="text" maxlength="1" class="otp-box" data-index="1" inputmode="numeric" />
          <input type="text" maxlength="1" class="otp-box" data-index="2" inputmode="numeric" />
          <input type="text" maxlength="1" class="otp-box" data-index="3" inputmode="numeric" />
          <input type="text" maxlength="1" class="otp-box" data-index="4" inputmode="numeric" />
          <input type="text" maxlength="1" class="otp-box" data-index="5" inputmode="numeric" />
          <input type="text" maxlength="1" class="otp-box" data-index="6" inputmode="numeric" />
          <input type="text" maxlength="1" class="otp-box" data-index="7" inputmode="numeric" />
        </div>

        <button class="btn-submit" id="btnVerify">
          Tasdiqlash
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </button>

        <div class="resend-row">
          <span>Kod kelmadimi?</span>
          <button class="btn-resend" id="btnResend">Qayta yuborish</button>
        </div>

        <button class="btn-back" id="btnBack">← Emailni o'zgartirish</button>
      </div>
    </div>
  </div>

  <script type="module" src="./src/login.js"></script>
</body>
</html>
